name: CodeRabbit Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  coderabbit-review:
    runs-on: ubuntu-latest
    name: CodeRabbit AI Review
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: CodeRabbit Review
      uses: coderabbitai/coderabbit-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # Optional: Add CodeRabbit API key if you have pro version
        # coderabbit_token: ${{ secrets.CODERABBIT_TOKEN }}
      env:
        # Project context for better reviews
        PROJECT_NAME: "Urgent Studio"
        PROJECT_TYPE: "Design Service Marketplace"
        TECH_STACK: "Next.js, TypeScript, Go, PostgreSQL"
        
    - name: Comment PR with review summary
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.login === 'github-actions[bot]' && 
            comment.body.includes('CodeRabbit Review Summary')
          );
          
          const reviewSummary = `
          ## 🤖 CodeRabbit Review Summary
          
          CodeRabbit telah selesai mereview PR ini. Silakan cek:
          
          - ✅ **Code Quality**: Analisis kualitas kode
          - 🔒 **Security**: Pemeriksaan keamanan
          - ⚡ **Performance**: Optimasi performa
          - 📝 **Best Practices**: Praktik terbaik TypeScript/Go
          
          > 💡 **Tip**: Gunakan suggestions dari CodeRabbit untuk meningkatkan kualitas kode
          
          ---
          *Powered by CodeRabbit AI for Urgent Studio*
          `;
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: reviewSummary
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reviewSummary
            });
          }